<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Feliz Cumple - Experiencia</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <canvas id="confetti-canvas"></canvas>

  <main class="app" id="app">
    <!-- Stage: Login -->
    <section class="stage stage--active" id="stage-login">
      <div class="login-card">
        <h1>Acceso</h1>
        <div class="pin-display" id="pin-display">••••••••</div>
        <div class="pad" id="num-pad">
          <!-- keypad generated by JS -->
        </div>
        <div class="hint">Introduce la contraseña</div>
      </div>
    </section>

    <!-- Stage: Cake (GIF) -->
    <section class="stage" id="stage-cake">
      <div class="cake-wrap">
        <div class="gif-frame">
          <img id="cake-gif" class="cake-gif" src="assets/cake.gif" alt="pastel animado">
          <img id="gif-overlay" class="gif-overlay" src="assets/overlay.png" alt="overlay" />
          <div class="note" id="note">
            <button id="btn-listo">LISTO</button>
          </div>
        </div>
      </div>
    </section>

    <!-- Stage: Letter removed - letter now opens in a separate page -->

    <!-- Gallery removed as requested -->

    <!-- Stage: Farewell -->
    <section class="stage" id="stage-farewell">
      <div class="farewell">
        <h2 id="farewell-text" class="farewell-title hidden">¡Feliz Cumpleaños! 🎉</p>
        <video id="farewell-video" class="farewell-video hidden" controls playsinline></video>
        <p id="farewell-subtext" class="farewell-subtext hidden">Te quiero mucho Maribel 😊</p>
        <img id="farewell-img" class="farewell-img hidden" src="assets/farewell.jpg" alt="regalo">
        <button id="bye" class="bye hidden">👋 BYE</button>
      </div>
    </section>

    
  </main>

  <div id="modal" class="modal hidden">
    <div class="modal-inner">
      <button id="modal-close">✕</button>
      <video id="gift-video" controls playsinline></video>
    </div>
  </div>

  <!-- Envelope modal (shown after LISTO) -->
  <div id="envelope-modal" class="modal hidden">
    <div class="modal-inner envelope-modal-inner">
      <button id="envelope-close">✕</button>
      <img id="envelope-img" src="" alt="sobre" />
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
